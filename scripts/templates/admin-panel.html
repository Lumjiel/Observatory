<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章管理 - 观测站</title>
<link rel="stylesheet" href="/assets/css/admin.css">
</head>
<body class="mode-%%PAGE_MODE%%">
<div class="topbar">
  <div class="topbar-left">
    <h1><span>📡</span> 文章管理</h1>
    <span class="topbar-stats" id="articleCount">%%ARTICLE_COUNT%% 篇文章</span>
  </div>
  <div class="topbar-right">
    <a href="/" id="navBack">← 前台</a>
    <a href="/logout" class="btn-logout">退出</a>
  </div>
</div>

<div class="admin-layout">
  <!-- 左侧导航 -->
  <nav class="nav-sidebar" id="navSidebar">
    <a class="nav-item" data-panel="list" href="/admin">📄 文章</a>
    <a class="nav-item" data-panel="settings" href="/admin/settings">⚙ 设置</a>
  </nav>

  <!-- 主内容区 -->
  <div class="main-content">
    <!-- 文章列表 -->
    <div class="content-panel" id="listPanel">
      <div class="list-toolbar">
        <div class="list-toolbar-left">
          <input type="text" id="searchInput" placeholder="搜索标题或标签...">
          <label class="draft-filter">
            <input type="checkbox" id="draftFilter" onchange="window.toggleDraftFilter()">
            <span>含草稿</span>
          </label>
        </div>
        <button class="btn-new" onclick="window.location.href='/admin/article/new'"><span>+</span> 新建</button>
      </div>
      <div class="article-list" id="articleList">
        %%ARTICLE_LIST%%
        %%EMPTY_STATE%%
      </div>
    </div>

    <!-- 编辑器 -->
    <div class="content-panel" id="editorPanel">
      <div class="editor-header">
        <div class="editor-header-left">
          <a href="/admin" class="btn btn-ghost" style="font-size:0.8rem;">← 返回</a>
          <span class="editor-title-label" id="editorTitle">新建文章</span>
        </div>
        <div class="editor-actions">
          <button class="btn btn-ghost" id="draftToggleBtn" onclick="window.toggleDraft()" style="display:none;">
            <span id="draftLabel">发布</span>
          </button>
          <button class="btn btn-primary" onclick="window.saveArticle()">保存</button>
          <button class="btn btn-danger" onclick="window.deleteCurrentArticle()" id="deleteBtn" style="display:none;">删除</button>
          <div style="display:none" id="newArticleBtn"></div>
          <div style="display:none" id="copyBtn"></div>
        </div>
      </div>

      <!-- 标题输入 -->
      <div class="editor-title-bar">
        <input type="text" id="articleTitle" placeholder="输入文章标题">
      </div>

      <!-- 折叠属性面板 -->
      <details class="editor-props" id="editorProps">
        <summary>📋 文章属性</summary>
        <div class="props-body">
          <div class="form-row">
            <div class="form-group">
              <label>分类</label>
              <select id="articleCategory">%%CATEGORY_OPTIONS%%</select>
            </div>
            <div class="form-group">
              <label>摘要</label>
              <input type="text" id="articleExcerpt" placeholder="简短描述文章内容">
            </div>
          </div>
          <div class="form-group">
            <label>标签</label>
            <div class="tag-input-wrapper" id="tagWrapper" onclick="document.getElementById('tagInput').focus()">
              <div id="tagChips"></div>
              <input type="text" id="tagInput" placeholder="输入标签后按 Enter">
            </div>
          </div>
        </div>
      </details>

      <!-- 编辑器 + 预览 -->
      <div class="editor-body">
        <div class="editor-toolbar">
          <button class="toolbar-btn" onclick="window.insertHeading(1)" title="一级标题">H1</button>
          <button class="toolbar-btn" onclick="window.insertHeading(2)" title="二级标题">H2</button>
          <button class="toolbar-btn" onclick="window.insertBold()" title="粗体"><b>B</b></button>
          <button class="toolbar-btn" onclick="window.insertItalic()" title="斜体"><i>I</i></button>
          <button class="toolbar-btn" onclick="window.insertCode()" title="代码">&lt;/&gt;</button>
          <button class="toolbar-btn" onclick="window.insertLink()" title="链接">[ ]</button>
          <button class="toolbar-btn" onclick="window.insertImage()" title="上传图片">Img</button>
          <span class="toolbar-spacer"></span>
          <button class="toolbar-btn toolbar-preview-btn" id="previewToggle" onclick="window.togglePreview()">▶ 预览</button>
        </div>
        <div class="editor-content-area">
          <div class="editor-wrapper" id="editorWrapper">
            <div id="editor-container"></div>
          </div>
          <div class="preview-panel" id="previewPanel">
            <div class="preview-header">
              <span class="preview-label">预览</span>
              <span id="previewStatus">就绪</span>
              <button class="preview-close" onclick="window.togglePreview()">✕</button>
            </div>
            <div class="preview-content-wrap">
              <div class="article-content" id="previewContent">
                <div class="editor-loading" id="previewPlaceholder">
                  <div style="color: var(--text-dim); text-align: center; padding: 2rem;">
                    开始编辑，实时预览将同步显示
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 设置 -->
    <div class="content-panel" id="settingsPanel">
      <div class="settings-header">
        <h2>⚙ 站点设置</h2>
      </div>
      <div class="settings-body">
        <div class="github-settings">
          <div class="settings-section-header">
            <span class="settings-section-title">📦 GitHub 仓库</span>
            <button class="btn btn-ghost btn-sm" id="githubRefreshBtn" onclick="window.refreshGithub()">↻ 刷新数据</button>
          </div>
          <div class="settings-section-desc">勾选要在首页展示的仓库</div>
          <div class="repo-list" id="repoList">
            <div class="loading-text">加载中...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="drop-overlay" id="dropOverlay">
  <span>📷 释放以上传图片</span>
</div>

<div class="upload-indicator" id="uploadIndicator">
  <span>⏳</span>
  <span id="uploadText">上传中...</span>
</div>

<div class="dialog-overlay" id="moveDialog">
  <div class="dialog">
    <h3>移动文章到</h3>
    <select id="moveTargetCategory">
      <option value="tutorials">教程</option>
      <option value="blog">博客</option>
      <option value="essays">随笔</option>
      <option value="projects">项目</option>
    </select>
    <div class="dialog-actions">
      <button class="btn btn-ghost" onclick="window.hideMoveDialog()">取消</button>
      <button class="btn btn-primary" onclick="window.doBatchMove()">确认移动</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  var layout = document.querySelector('.admin-layout');
  var pageMode = document.body.classList.contains('mode-list') ? 'list'
    : document.body.classList.contains('mode-editor') ? 'editor'
    : document.body.classList.contains('mode-settings') ? 'settings'
    : 'list';

  // 面板切换
  function showPanel(name) {
    document.querySelectorAll('.content-panel').forEach(function(p) {
      p.classList.toggle('active', p.id === name + 'Panel');
    });
    document.querySelectorAll('.nav-item').forEach(function(item) {
      item.classList.toggle('active', item.dataset.panel === name);
    });
  }
  window.showPanel = showPanel;

  // 导航点击
  document.querySelectorAll('.nav-item').forEach(function(item) {
    item.addEventListener('click', function(e) {
      e.preventDefault();
      var panel = this.dataset.panel;
      if (panel === 'settings') {
        window.location.href = '/admin/settings';
      } else {
        window.location.href = '/admin';
      }
    });
  });

  // 预览切换
  window.togglePreview = function() {
    document.querySelector('.editor-content-area').classList.toggle('preview-open');
    var btn = document.getElementById('previewToggle');
    var isOpen = document.querySelector('.editor-content-area').classList.contains('preview-open');
    btn.innerHTML = isOpen ? '✕ 预览' : '▶ 预览';
  };

  // 移动端面板切换
  window.showMobileList = function() {
    layout.classList.remove('mobile-editing');
    layout.classList.remove('mobile-preview');
  };
  window.toggleMobilePreview = function() {
    layout.classList.toggle('mobile-preview');
  };

  // 草稿过滤器
  window.toggleDraftFilter = function() {
    var show = document.getElementById('draftFilter').checked;
    document.querySelectorAll('.article-item').forEach(function(item) {
      item.style.display = show ? '' : (item.classList.contains('article-draft') ? 'none' : '');
    });
  };

  // 搜索高亮
  window.handleSearch = function(keyword) {
    var items = document.querySelectorAll('.article-item');
    items.forEach(function(item) {
      var titleEl = item.querySelector('.article-item-title');
      if (!titleEl.dataset.orig) titleEl.dataset.orig = titleEl.textContent;
      if (keyword) {
        var regex = new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        titleEl.innerHTML = titleEl.dataset.orig.replace(regex, '<mark>$1</mark>');
      } else {
        titleEl.innerHTML = titleEl.dataset.orig;
      }
    });
  };

  // GitHub 仓库
  window.loadGithubRepos = async function() {
    try {
      var res = await fetch('/api/github');
      if (!res.ok) return;
      var data = await res.json();
      var el = document.getElementById('repoList');
      if (!el) return;
      el.innerHTML = data.repos.map(function(r) {
        return '<label class="repo-item">' +
          '<input type="checkbox" data-repo="' + r.name + '"' + (r.shown ? ' checked' : '') + '>' +
          '<span class="repo-name">' + r.name + '</span>' +
          '<span class="repo-lang">' + (r.language || '-') + '</span>' +
        '</label>';
      }).join('');
      el.querySelectorAll('input[type="checkbox"]').forEach(function(cb) {
        cb.addEventListener('change', window.saveGithubRepos);
      });
    } catch (e) { console.error('加载仓库失败', e); }
  };

  window.saveGithubRepos = async function() {
    var checked = Array.from(document.querySelectorAll('#repoList input:checked')).map(function(cb) { return cb.dataset.repo; });
    try {
      await fetch('/api/github/repos', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ shownRepos: checked })
      });
    } catch (e) { console.error('保存仓库设置失败', e); }
  };

  window.refreshGithub = async function() {
    var btn = document.getElementById('githubRefreshBtn');
    if (btn) { btn.disabled = true; btn.textContent = '刷新中...'; }
    try {
      await fetch('/api/github/refresh', { method: 'POST' });
      await window.loadGithubRepos();
    } catch (e) { console.error('刷新 GitHub 失败', e); }
    if (btn) { btn.disabled = false; btn.textContent = '↻ 刷新'; }
  };

  // 初始化
  showPanel(pageMode);
  if (pageMode === 'settings') {
    window.loadGithubRepos();
  }
  if (pageMode === 'editor') {
    document.querySelector('.editor-content-area').classList.add('preview-open');
  }
})();
</script>

<script src="/assets/js/admin-panel.bundle.js"></script>
<script>
// 在 bundle 加载后覆写：列表点击 → 导航到编辑器页面
(function() {
  var layout = document.querySelector('.admin-layout');

  window.handleItemClick = function(slug, event) {
    window.location.href = '/admin/article/' + encodeURIComponent(slug);
  };

  // 移动端：编辑器视图切换
  var origLoadArticle = window.loadArticle;
  if (origLoadArticle) {
    window.loadArticle = function(slug) {
      origLoadArticle(slug);
      layout.classList.add('mobile-editing');
      document.getElementById('draftToggleBtn').style.display = '';
    };
  }
  var origNewArticle = window.newArticle;
  if (origNewArticle) {
    window.newArticle = function() {
      origNewArticle();
      layout.classList.add('mobile-editing');
      document.getElementById('draftToggleBtn').style.display = '';
    };
  }

  // 编辑器页面自动加载文章
  if (document.body.classList.contains('mode-editor')) {
    var slug = window.location.pathname.replace(/^\/admin\/article\//, '');
    if (slug && slug !== 'new') {
      window.loadArticle(decodeURIComponent(slug));
    }
  }
})();
</script>
</body>
</html>
