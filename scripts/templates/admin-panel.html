<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章管理 - 观测站</title>
<style>
  :root {
    --bg: #0A0F16;
    --surface: #111922;
    --surface-hover: #1a2535;
    --border: #1E2A36;
    --green: #00E5A0;
    --amber: #FFB300;
    --magenta: #FF6B9D;
    --blue: #4DB8FF;
    --text: #E0E8F0;
    --text-dim: #6B7F8F;
    --red: #ff4757;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.8rem 1.2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 1rem; }
  .topbar h1 { color: var(--green); font-size: 1.1rem; }
  .topbar-stats { color: var(--text-dim); font-size: 0.85rem; }
  .topbar-right { display: flex; align-items: center; gap: 0.8rem; }
  .topbar a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
    padding: 0.4rem 0.8rem;
    border-radius: 4px;
    transition: all 0.2s;
  }
  .topbar a:hover { color: var(--green); background: var(--surface-hover); }
  .admin-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 52px);
  }
  .sidebar {
    width: 300px;
    min-width: 300px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-search {
    padding: 0.8rem;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-search input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem 0.8rem;
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .sidebar-search input:focus { border-color: var(--green); }
  .sidebar-search input::placeholder { color: var(--text-dim); }
  .sidebar-header {
    padding: 0.8rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .sidebar-header h2 { font-size: 0.85rem; color: var(--text-dim); }
  .sidebar-actions {
    display: flex;
    gap: 0.4rem;
  }
  .btn-sm {
    padding: 0.25rem 0.6rem;
    border-radius: 4px;
    font-family: inherit;
    font-size: 0.75rem;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-sm-danger { background: var(--red); color: #fff; }
  .btn-sm-danger:hover { opacity: 0.85; }
  .btn-sm-move { background: var(--blue); color: #000; }
  .btn-sm-move:hover { opacity: 0.85; }
  .btn-sm:disabled { opacity: 0.4; cursor: not-allowed; }
  .new-btn {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 4px;
    padding: 0.4rem 0.8rem;
    font-family: inherit;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .new-btn:hover { opacity: 0.85; }
  .article-list { flex: 1; overflow-y: auto; }
  .article-item {
    padding: 0.7rem 1rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .article-item:hover { background: var(--surface-hover); }
  .article-item.active { background: var(--surface-hover); border-left: 3px solid var(--green); }
  .article-item input[type="checkbox"] {
    width: 16px;
    height: 16px;
    cursor: pointer;
    accent-color: var(--green);
    flex-shrink: 0;
  }
  .article-item-title {
    color: var(--text);
    font-size: 0.85rem;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .article-item-meta {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.7rem;
    color: var(--text-dim);
  }
  .article-item-order {
    font-size: 0.65rem;
    color: var(--amber);
    background: rgba(255,179,0,0.1);
    padding: 0.1rem 0.3rem;
    border-radius: 3px;
    flex-shrink: 0;
  }
  .cat-tag {
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    font-size: 0.65rem;
  }
  .cat-tutorials { background: rgba(77,184,255,0.15); color: var(--blue); }
  .cat-blog { background: rgba(0,229,160,0.15); color: var(--green); }
  .cat-essays { background: rgba(255,179,0,0.15); color: var(--amber); }
  .cat-projects { background: rgba(255,107,157,0.15); color: var(--magenta); }
  .move-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 0.3rem 0.5rem;
    color: var(--text);
    font-family: inherit;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .editor-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 1.5rem;
  }
  .editor-panel.hidden { display: none; }
  .editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.2rem;
  }
  .editor-header h2 { font-size: 1.1rem; color: var(--green); }
  .editor-actions { display: flex; gap: 0.5rem; }
  .btn {
    padding: 0.5rem 1rem;
    border-radius: 6px;
    font-family: inherit;
    font-size: 0.85rem;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
  }
  .btn-primary { background: var(--green); color: #000; font-weight: 600; }
  .btn-primary:hover { opacity: 0.85; }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { opacity: 0.85; }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }
  .btn-copy { background: var(--blue); color: #000; }
  .btn-copy:hover { opacity: 0.85; }
  .editor-form { flex: 1; display: flex; flex-direction: column; gap: 0.8rem; overflow-y: auto; }
  .form-row { display: flex; gap: 0.8rem; flex-wrap: wrap; }
  .form-row .form-group { flex: 1; min-width: 150px; }
  .form-group { display: flex; flex-direction: column; gap: 0.3rem; }
  .form-group label { font-size: 0.75rem; color: var(--text-dim); }
  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem 0.8rem;
    color: var(--text);
    font-family: inherit;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--green); }
  .form-group select { cursor: pointer; }
  .form-group textarea { flex: 1; resize: none; min-height: 250px; font-size: 0.8rem; line-height: 1.6; }
  .tag-input-wrapper {
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.5rem;
    min-height: 40px;
    cursor: text;
    transition: border-color 0.2s;
  }
  .tag-input-wrapper:focus-within { border-color: var(--green); }
  .tag-chip {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    background: rgba(0,229,160,0.15);
    color: var(--green);
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    font-size: 0.75rem;
  }
  .tag-chip .remove-tag {
    cursor: pointer;
    opacity: 0.6;
    transition: opacity 0.15s;
  }
  .tag-chip .remove-tag:hover { opacity: 1; }
  .tag-input-wrapper input {
    flex: 1;
    min-width: 80px;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 0.8rem;
    padding: 0.2rem;
  }
  .preview-panel {
    width: 400px;
    min-width: 400px;
    border-left: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .preview-header {
    padding: 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
    color: var(--text-dim);
  }
  .preview-content {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    font-size: 0.85rem;
    line-height: 1.7;
  }
  .preview-content h1, .preview-content h2, .preview-content h3 { color: var(--text); margin: 1rem 0 0.5rem; }
  .preview-content p { margin-bottom: 0.8rem; }
  .preview-content code { background: var(--bg); padding: 0.1rem 0.3rem; border-radius: 3px; }
  .preview-content pre { background: var(--bg); padding: 1rem; border-radius: 6px; overflow-x: auto; margin-bottom: 1rem; }
  .preview-content pre code { background: none; padding: 0; }
  .preview-content ul, .preview-content ol { margin-left: 1.5rem; margin-bottom: 1rem; }
  .preview-content blockquote {
    border-left: 3px solid var(--green);
    padding-left: 1rem;
    color: var(--text-dim);
    margin: 1rem 0;
  }
  .preview-content img { max-width: 100%; border-radius: 6px; }
  .preview-content a { color: var(--blue); }
  .preview-placeholder {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    font-size: 0.85rem;
  }
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    gap: 1rem;
  }
  .empty-state .icon { font-size: 3rem; opacity: 0.3; }
  .empty-state p { font-size: 0.9rem; }
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface);
    border: 1px solid var(--green);
    color: var(--text);
    padding: 0.8rem 1.5rem;
    border-radius: 8px;
    font-size: 0.9rem;
    z-index: 1000;
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { border-color: var(--red); }
  @media (max-width: 900px) {
    .preview-panel { display: none; }
    .sidebar { width: 240px; min-width: 240px; }
  }
  @media (max-width: 600px) {
    .admin-layout { flex-direction: column; }
    .sidebar { width: 100%; height: 200px; }
  }
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <h1>📡 文章管理</h1>
    <span class="topbar-stats">共 <span id="articleCount">%%ARTICLE_COUNT%%</span> 篇</span>
  </div>
  <div class="topbar-right">
    <a href="/">← 返回观测站</a>
    <a href="/logout">退出</a>
  </div>
</div>

<div class="admin-layout">
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="搜索文章...">
    </div>
    <div class="sidebar-header">
      <h2>文章列表</h2>
      <div class="sidebar-actions">
        <button class="btn-sm btn-sm-move" id="batchMoveBtn" disabled onclick="showMoveDialog()">移动</button>
        <button class="btn-sm btn-sm-danger" id="batchDeleteBtn" disabled onclick="batchDeleteSelected()">删除</button>
      </div>
    </div>
    <div class="article-list" id="articleList">
      %%ARTICLE_LIST%%
      %%EMPTY_STATE%%
    </div>
    <div style="padding: 0.8rem; border-top: 1px solid var(--border);">
      <button class="new-btn" onclick="newArticle()" style="width:100%">+ 新建</button>
    </div>
  </div>

  <div class="editor-panel" id="editorPanel">
    <div class="editor-form" id="editorForm">
      <div class="editor-header">
        <h2 id="editorTitle">新建文章</h2>
        <div class="editor-actions">
          <button class="btn btn-ghost" onclick="togglePreview()">预览</button>
          <button class="btn btn-copy" onclick="duplicateArticle()">复制</button>
          <button class="btn btn-primary" onclick="saveArticle()">保存</button>
          <button class="btn btn-danger" onclick="deleteCurrentArticle()" id="deleteBtn" style="display:none;">删除</button>
          <button class="btn btn-ghost" onclick="newArticle()" id="newArticleBtn">新建</button>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group" style="flex:3">
          <label>标题</label>
          <input type="text" id="articleTitle" placeholder="文章标题">
        </div>
        <div class="form-group" style="flex:1">
          <label>分类</label>
          <select id="articleCategory">%%CATEGORY_OPTIONS%%</select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>摘要</label>
          <input type="text" id="articleExcerpt" placeholder="文章摘要">
        </div>
        <div class="form-group">
          <label>阅读时间</label>
          <input type="text" id="articleReadingTime" placeholder="如: 10 min">
        </div>
        <div class="form-group">
          <label>排序值</label>
          <input type="number" id="articleOrder" placeholder="数值越小越靠前" min="0">
        </div>
      </div>
      <div class="form-group">
        <label>标签</label>
        <div class="tag-input-wrapper" id="tagWrapper" onclick="document.getElementById('tagInput').focus()">
          <div id="tagChips"></div>
          <input type="text" id="tagInput" placeholder="输入标签后按 Enter 添加">
        </div>
      </div>
      <div class="form-group" style="flex:1; display:flex; flex-direction:column;">
        <label>内容 (Markdown)</label>
        <textarea id="articleContent" placeholder="文章内容，支持 Markdown 格式" style="flex:1"></textarea>
      </div>
    </div>
  </div>

  <div class="preview-panel" id="previewPanel" style="display:none;">
    <div class="preview-header">预览</div>
    <div class="preview-content" id="previewContent">
      <div class="preview-placeholder">输入内容后点击预览</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div id="moveDialog" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1.5rem;min-width:300px;">
    <h3 style="color:var(--green);margin-bottom:1rem;">移动到分类</h3>
    <select id="moveTargetCategory" class="move-select" style="width:100%;padding:0.5rem;margin-bottom:1rem;">
      <option value="tutorials">教程</option>
      <option value="blog">博客</option>
      <option value="essays">随笔</option>
      <option value="projects">项目</option>
    </select>
    <div style="display:flex;gap:0.5rem;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="hideMoveDialog()">取消</button>
      <button class="btn btn-primary" onclick="doBatchMove()">确认移动</button>
    </div>
  </div>
</div>

<script>
const API = '/api/articles';
let currentSlug = null;
let currentTags = [];
let showPreview = false;
let allArticles = [];
let selectedSlugs = new Set();

function showToast(msg, isError = false) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast' + (isError ? ' error' : '');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// 加载文章列表（用于搜索）
async function loadArticleList() {
  try {
    const res = await fetch(API);
    if (!res.ok) return;
    allArticles = await res.json();
    renderArticleList(allArticles);
  } catch(e) { console.error(e); }
}

// 渲染文章列表
function renderArticleList(articles) {
  const container = document.getElementById('articleList');
  const categoryLabels = { tutorials: '教程', blog: '博客', essays: '随笔', projects: '项目' };

  if (articles.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>暂无文章</p></div>';
    return;
  }

  // 按 order 升序，date 降序
  const sorted = [...articles].sort((a, b) => {
    if (a.order !== b.order) return (a.order || 0) - (b.order || 0);
    return 0;
  });

  container.innerHTML = sorted.map(a => `
    <div class="article-item" data-slug="${a.slug}" onclick="handleItemClick('${a.slug}', event)">
      <input type="checkbox" ${selectedSlugs.has(a.slug) ? 'checked' : ''} onclick="event.stopPropagation();toggleSelect('${a.slug}')">
      <div style="flex:1;overflow:hidden;">
        <div class="article-item-title">${a.title}</div>
        <div class="article-item-meta">
          <span class="cat-tag cat-${a.category}">${categoryLabels[a.category] || a.category}</span>
          <span>${(a.tags || []).slice(0, 2).join(', ')}${(a.tags || []).length > 2 ? '...' : ''}</span>
        </div>
      </div>
      ${(a.order || 0) > 0 ? `<span class="article-item-order">#${a.order}</span>` : ''}
    </div>
  `).join('');
}

// 搜索过滤
document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    renderArticleList(allArticles);
  } else {
    const filtered = allArticles.filter(a =>
      a.title.toLowerCase().includes(q) ||
      (a.tags || []).some(t => t.toLowerCase().includes(q))
    );
    renderArticleList(filtered);
  }
});

// 选择逻辑
function handleItemClick(slug, event) {
  if (event.target.type === 'checkbox') return;
  loadArticle(slug);
}

function toggleSelect(slug) {
  if (selectedSlugs.has(slug)) {
    selectedSlugs.delete(slug);
  } else {
    selectedSlugs.add(slug);
  }
  updateBatchButtons();
}

function updateBatchButtons() {
  const count = selectedSlugs.size;
  document.getElementById('batchDeleteBtn').disabled = count === 0;
  document.getElementById('batchMoveBtn').disabled = count === 0;
}

async function batchDeleteSelected() {
  if (selectedSlugs.size === 0) return;
  if (!confirm(`确定删除选中的 ${selectedSlugs.size} 篇文章？`)) return;

  const slugs = [...selectedSlugs].map(slug => {
    const a = allArticles.find(x => x.slug === slug);
    return { slug, category: a.category };
  });

  const res = await fetch(API + '/batch-delete', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slugs })
  });

  if (res.ok) {
    showToast('已删除');
    selectedSlugs.clear();
    setTimeout(() => window.location.reload(), 1000);
  } else {
    const data = await res.json();
    showToast(data.error || '删除失败', true);
  }
}

function showMoveDialog() {
  document.getElementById('moveDialog').style.display = 'flex';
}

function hideMoveDialog() {
  document.getElementById('moveDialog').style.display = 'none';
}

async function doBatchMove() {
  const target = document.getElementById('moveTargetCategory').value;
  const slugs = [...selectedSlugs].map(slug => {
    const a = allArticles.find(x => x.slug === slug);
    return { slug, category: a.category };
  });

  const res = await fetch(API + '/batch-move', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ slugs, targetCategory: target })
  });

  hideMoveDialog();
  if (res.ok) {
    showToast('已移动');
    selectedSlugs.clear();
    setTimeout(() => window.location.reload(), 1000);
  } else {
    const data = await res.json();
    showToast(data.error || '移动失败', true);
  }
}

function loadArticle(slug) {
  document.querySelectorAll('.article-item').forEach(el => el.classList.remove('active'));
  var el = document.querySelector('[data-slug="' + slug + '"]');
  if (el) el.classList.add('active');

  fetch(API + '/' + slug)
    .then(r => r.json())
    .then(article => {
      currentSlug = article.slug;
      document.getElementById('editorTitle').textContent = '编辑文章';
      document.getElementById('articleTitle').value = article.title;
      document.getElementById('articleCategory').value = article.category;
      document.getElementById('articleContent').value = article.content;
      document.getElementById('articleExcerpt').value = article.excerpt || '';
      document.getElementById('articleReadingTime').value = article.readingTime || '';
      document.getElementById('articleOrder').value = article.order || 0;
      currentTags = article.tags || [];
      renderTagChips();
      document.getElementById('deleteBtn').style.display = '';
      document.getElementById('newArticleBtn').style.display = 'none';
    })
    .catch(err => showToast('加载失败: ' + err, true));
}

function newArticle() {
  document.querySelectorAll('.article-item').forEach(el => el.classList.remove('active'));
  currentSlug = null;
  currentTags = [];
  selectedSlugs.clear();
  updateBatchButtons();
  document.getElementById('editorTitle').textContent = '新建文章';
  document.getElementById('articleTitle').value = '';
  document.getElementById('articleCategory').value = 'blog';
  document.getElementById('articleContent').value = '';
  document.getElementById('articleExcerpt').value = '';
  document.getElementById('articleReadingTime').value = '';
  document.getElementById('articleOrder').value = 0;
  renderTagChips();
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('newArticleBtn').style.display = '';
}

function renderTagChips() {
  const container = document.getElementById('tagChips');
  container.innerHTML = currentTags.map(t =>
    `<span class="tag-chip">${t}<span class="remove-tag" onclick="removeTag('${t}')">×</span></span>`
  ).join('');
  document.getElementById('tagInput').value = '';
}

function addTag(tag) {
  tag = tag.trim();
  if (tag && !currentTags.includes(tag)) {
    currentTags.push(tag);
    renderTagChips();
  }
}

function removeTag(tag) {
  currentTags = currentTags.filter(t => t !== tag);
  renderTagChips();
}

document.getElementById('tagInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    addTag(e.target.value);
  }
});

async function saveArticle() {
  const title = document.getElementById('articleTitle').value.trim();
  const category = document.getElementById('articleCategory').value;
  const content = document.getElementById('articleContent').value;
  const tags = currentTags;
  const excerpt = document.getElementById('articleExcerpt').value.trim();
  const readingTime = document.getElementById('articleReadingTime').value.trim();
  const order = parseInt(document.getElementById('articleOrder').value) || 0;

  if (!title) { showToast('请输入标题', true); return; }
  if (!content) { showToast('请输入内容', true); return; }

  const body = { title, category, content, tags, excerpt, readingTime, order };

  let res;
  if (currentSlug) {
    res = await fetch(API + '/' + currentSlug, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  } else {
    res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  }

  const data = await res.json();
  if (res.ok) {
    showToast(currentSlug ? '保存成功' : '创建成功');
    setTimeout(() => window.location.reload(), 1000);
  } else {
    showToast(data.error || '操作失败', true);
  }
}

async function deleteCurrentArticle() {
  if (!currentSlug) return;
  if (!confirm('确定删除这篇文章？')) return;

  const res = await fetch(API + '/' + currentSlug, { method: 'DELETE' });
  if (res.ok) {
    showToast('已删除');
    setTimeout(() => window.location.reload(), 1000);
  } else {
    const data = await res.json();
    showToast(data.error || '删除失败', true);
  }
}

async function duplicateArticle() {
  if (!currentSlug) { showToast('请先加载一篇文章', true); return; }
  const res = await fetch(API + '/' + currentSlug + '/duplicate', { method: 'POST' });
  const data = await res.json();
  if (res.ok) {
    showToast('已复制');
    setTimeout(() => window.location.reload(), 1000);
  } else {
    showToast(data.error || '复制失败', true);
  }
}

async function togglePreview() {
  showPreview = !showPreview;
  const panel = document.getElementById('previewPanel');
  panel.style.display = showPreview ? 'flex' : 'none';
  if (showPreview) {
    const content = document.getElementById('articleContent').value;
    if (!content) {
      document.getElementById('previewContent').innerHTML = '<div class="preview-placeholder">无内容</div>';
      return;
    }
    try {
      const res = await fetch('/api/preview?content=' + encodeURIComponent(content));
      const data = await res.json();
      document.getElementById('previewContent').innerHTML = data.html || '<div class="preview-placeholder">无内容</div>';
    } catch(e) {
      document.getElementById('previewContent').innerHTML = '<div class="preview-placeholder">预览加载失败</div>';
    }
  }
}

// 初始化
loadArticleList();
</script>
