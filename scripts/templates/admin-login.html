<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文章管理 - 观测站</title>
<style>
  :root {
    --bg: #0A0F16;
    --surface: #111922;
    --border: #1E2A36;
    --green: #00E5A0;
    --text: #E0E8F0;
    --text-dim: #6B7F8F;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2.5rem;
    width: 360px;
    max-width: 90vw;
  }
  .login-box h1 {
    color: var(--green);
    font-size: 1.4rem;
    margin-bottom: 0.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .login-box p {
    color: var(--text-dim);
    font-size: 0.85rem;
    margin-bottom: 1.5rem;
  }
  .form-group { margin-bottom: 1rem; }
  .form-group label {
    display: block;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 0.4rem;
  }
  .form-group input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-family: inherit;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus {
    border-color: var(--green);
  }
  .submit-btn {
    width: 100%;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 0.8rem;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .submit-btn:hover { opacity: 0.85; }
  .error-msg {
    color: #ff4757;
    font-size: 0.85rem;
    margin-top: 0.8rem;
    display: none;
  }
  .back-link {
    display: block;
    text-align: center;
    margin-top: 1.2rem;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
  }
  .back-link:hover { color: var(--green); }
</style>
</head>
<body>
<div class="login-box">
  <h1>📡 文章管理</h1>
  <p>输入密码访问管理后台</p>
  <form id="loginForm">
    <div class="form-group">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" autofocus>
    </div>
    <button type="submit" class="submit-btn">进入管理后台</button>
    <p class="error-msg" id="errorMsg"></p>
  </form>
  <a href="javascript:void(0)" onclick="window.location.href=(window.BASE_PATH||'')+'/'" class="back-link">← 返回观测站</a>
</div>
<script>
const form = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');
form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const res = await fetch(window.API_BASE + '/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password })
  });
  if (res.ok) {
    window.location.href = (window.BASE_PATH || '') + '/admin';
  } else {
    const data = await res.json();
    errorMsg.textContent = data.error;
    errorMsg.style.display = 'block';
  }
});
</script>
</body>
</html>
